<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="阅读星球">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>阅读星球</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- User Selection Screen -->
    <div id="screen-users" class="screen active">
      <div class="container">
        <h1 class="app-title">📚 阅读星球</h1>
        <p class="subtitle">选择你的星球</p>
        <div id="user-list" class="user-grid"></div>
        <button id="btn-add-user" class="btn btn-outline" onclick="showAddUser()">+ 添加新成员</button>
      </div>
    </div>

    <!-- Add User Screen -->
    <div id="screen-add-user" class="screen">
      <div class="container">
        <button class="btn-back" onclick="showScreen('screen-users')">← 返回</button>
        <h2>新成员</h2>
        <div class="form-group">
          <label>名字</label>
          <input type="text" id="input-username" placeholder="输入名字" maxlength="10">
        </div>
        <div class="form-group">
          <label>选一个颜色</label>
          <div id="color-picker" class="color-grid"></div>
        </div>
        <button class="btn btn-primary" onclick="createUser()">创建</button>
      </div>
    </div>

    <!-- Main Dashboard -->
    <div id="screen-dashboard" class="screen">
      <div class="container">
        <div class="dash-header">
          <button class="btn-back" onclick="showScreen('screen-users')">← 切换</button>
          <h2 id="dash-username"></h2>
          <span id="dash-count" class="book-count">0 本</span>
        </div>

        <!-- Progress Ring -->
        <div class="progress-section">
          <div class="progress-ring-container">
            <svg class="progress-ring" viewBox="0 0 200 200">
              <circle class="progress-ring-bg" cx="100" cy="100" r="85"/>
              <circle class="progress-ring-fill" cx="100" cy="100" r="85"/>
            </svg>
            <div class="progress-center">
              <span id="progress-number">0</span>
              <span class="progress-label">本书</span>
            </div>
          </div>
          <p id="progress-milestone" class="milestone-text"></p>
        </div>

        <!-- Visual Reading Adventure -->
        <div class="adventure-section">
          <h3>🚀 我的阅读冒险</h3>
          <div id="reading-adventure" class="reading-adventure">
            <div class="adventure-scene" id="adventure-scene">
              <!-- Dynamically rendered -->
            </div>
            <div class="adventure-progress-bar">
              <div class="adventure-bar-fill" id="adventure-bar-fill"></div>
              <span class="adventure-bar-label" id="adventure-bar-label">0 / 50</span>
            </div>
          </div>
        </div>

        <!-- Reading Garden -->
        <div class="garden-section">
          <h3>🌸 我的阅读花园</h3>
          <div id="reading-garden" class="reading-garden"></div>
        </div>

        <!-- Today's Snapshot -->
        <div class="snapshot-section">
          <h3>📸 今日阅读快照</h3>
          <div id="today-books" class="today-books-grid"></div>
          <p id="no-today" class="empty-hint">今天还没有记录哦，去添加一本吧！</p>
        </div>

        <!-- Book List -->
        <div class="book-list-section">
          <h3>📖 所有书籍 <span id="total-label"></span></h3>
          <div id="book-list" class="book-list"></div>
        </div>

        <!-- Add Book FAB -->
        <button id="fab-add" class="fab" onclick="showAddBook()">+</button>
      </div>
    </div>

    <!-- Add Book Screen -->
    <div id="screen-add-book" class="screen">
      <div class="container">
        <button class="btn-back" onclick="showScreen('screen-dashboard')">← 返回</button>
        <h2>记录一本书</h2>

        <div class="add-book-options">
          <div class="option-card" onclick="startCamera()">
            <div class="option-icon">📷</div>
            <p>拍照识别</p>
            <span class="option-desc">拍书封面，自动识别书名</span>
          </div>
          <div class="option-card" onclick="showManualInput()">
            <div class="option-icon">✏️</div>
            <p>手动输入</p>
            <span class="option-desc">直接输入书名</span>
          </div>
        </div>

        <!-- Camera Section (iOS-compatible file input) -->
        <div id="camera-section" class="hidden">
          <input type="file" id="camera-file-input" accept="image/*" capture="environment"
                 class="hidden" onchange="processImageFile(this.files[0]); this.value='';">
          <div id="captured-preview" class="hidden">
            <img id="captured-img" alt="captured">
            <p id="ocr-status">正在识别...</p>
            <div id="ocr-result" class="hidden">
              <label>识别结果</label>
              <input type="text" id="ocr-book-name" placeholder="书名">
              <button class="btn btn-primary" onclick="saveBookFromOCR()">保存</button>
            </div>
          </div>
        </div>

        <!-- Manual Input Section -->
        <div id="manual-section" class="hidden">
          <div class="form-group">
            <label>书名</label>
            <input type="text" id="input-book-name" placeholder="输入书名">
          </div>
          <button class="btn btn-primary" onclick="saveBookManual()">保存</button>
        </div>
      </div>
    </div>

    <!-- Custom Confirm Dialog -->
    <div id="confirm-dialog" class="confirm-dialog hidden">
      <div class="confirm-box">
        <div id="confirm-icon" class="confirm-icon"></div>
        <h3 id="confirm-title"></h3>
        <p id="confirm-message"></p>
        <div class="confirm-actions">
          <button class="btn btn-cancel" id="confirm-cancel">取消</button>
          <button class="btn btn-danger" id="confirm-ok">确定</button>
        </div>
      </div>
    </div>

    <!-- Celebration Overlay -->
    <div id="celebration-overlay" class="celebration hidden">
      <div class="celebration-content">
        <div id="celebration-icon"></div>
        <h2 id="celebration-title"></h2>
        <p id="celebration-message"></p>
        <button class="btn btn-primary" onclick="closeCelebration()">太棒了！</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <!-- Tesseract OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <!-- App -->
  <script src="js/app.js"></script>
</body>
</html>
